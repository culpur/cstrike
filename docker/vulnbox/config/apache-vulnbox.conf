<VirtualHost *:80>
    DocumentRoot /var/www/vulnbox
    ServerName vulnbox

    <Directory /var/www/vulnbox>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/vulnbox/uploads>
        Options Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Location /server-status>
        SetHandler server-status
        Require all granted
    </Location>

    php_admin_value allow_url_include On
    php_admin_value allow_url_fopen On
    php_admin_value display_errors On
    php_admin_value expose_php On

    ErrorLog /var/log/apache2/vulnbox-error.log
    CustomLog /var/log/apache2/vulnbox-access.log combined
</VirtualHost>
