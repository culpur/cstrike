<VirtualHost *:443>
    DocumentRoot /var/www/vulnbox
    ServerName vulnbox

    # Vuln: Weak SSL configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/vulnbox/vulnbox.crt
    SSLCertificateKeyFile /etc/ssl/vulnbox/vulnbox.key

    # Vuln: Allow weak protocols and ciphers
    SSLProtocol all -SSLv2
    SSLCipherSuite ALL:!ADH:RC4+RSA:+HIGH:+MEDIUM:+LOW:+EXP

    # Vuln: No HSTS
    # Vuln: No OCSP stapling

    <Directory /var/www/vulnbox>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/vulnbox/uploads>
        Options Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/vulnbox/.git>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ScriptAlias /cgi-bin/ /usr/lib/cgi-bin/
    <Directory /usr/lib/cgi-bin>
        AllowOverride None
        Options +ExecCGI
        Require all granted
        AddHandler cgi-script .cgi .sh .pl
    </Directory>

    <Location /server-status>
        SetHandler server-status
        Require all granted
    </Location>

    php_admin_value allow_url_include On
    php_admin_value allow_url_fopen On
    php_admin_value display_errors On
    php_admin_value expose_php On

    ErrorLog /var/log/apache2/vulnbox-ssl-error.log
    CustomLog /var/log/apache2/vulnbox-ssl-access.log combined
</VirtualHost>
