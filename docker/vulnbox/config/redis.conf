# VulnBox Redis — deliberately insecure configuration
# WARNING: No authentication, bound to all interfaces — for pentest targets only.

bind 0.0.0.0
port 6379

# No password — unauthenticated access
# requirepass <disabled>

# No protected-mode so remote connections work without auth
protected-mode no

# Logging
loglevel notice
logfile ""

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis

# Allow writes via CONFIG SET (useful for RCE via redis-cli)
# This is intentionally left enabled
rename-command "" ""
