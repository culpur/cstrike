# CStrike v2 — Docker Compose Stack
# All services use network_mode: host for direct host tool access
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker exec -it cstrike-api python -m tui

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cstrike-postgres
    network_mode: host
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cstrike}
      POSTGRES_USER: ${POSTGRES_USER:-cstrike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cstrike}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cstrike} -d ${POSTGRES_DB:-cstrike}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cstrike-redis
    network_mode: host
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-cstrike}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cstrike}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CStrike API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cstrike-api
    network_mode: host
    restart: unless-stopped
    # Security tools (nmap) require raw socket access
    cap_add:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-cstrike}:${POSTGRES_PASSWORD:-cstrike}@127.0.0.1:5432/${POSTGRES_DB:-cstrike}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cstrike}@127.0.0.1:6379
      CORS_ORIGINS: http://localhost:3000,https://cstrike,https://cstrike.local
      HOST_BIN_PATH: /host/usr/bin
      HOST_SBIN_PATH: /host/usr/sbin
      HOST_LOCAL_BIN_PATH: /host/usr/local/bin
      HOST_OPT_PATH: /host/opt
      LOG_LEVEL: info
      METRICS_INTERVAL: "2000"
    volumes:
      # Host tool access (read-only bind mounts, fallback for host-only tools)
      - /usr/bin:/host/usr/bin:ro
      - /usr/sbin:/host/usr/sbin:ro
      - /usr/local/bin:/host/usr/local/bin:ro
      - /opt:/host/opt:ro
      # Shared data
      - /usr/share/wordlists:/usr/share/wordlists:ro
      - apidata:/opt/cstrike/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── CStrike Web Frontend ───────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cstrike-frontend
    network_mode: host
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Traefik Reverse Proxy ──────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: cstrike-traefik
    network_mode: host
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--api.dashboard=false"
    volumes:
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./docker/certs:/certs:ro

  # ── Kasm Browser (Web-based CStrike Access) ──────────────
  # Remote browser session that auto-opens the CStrike frontend
  # Access via https://<mgmt-ip>:6901 or https://<tailscale-ip>:6901
  kasm-browser:
    image: kasmweb/chrome:1.16.0
    container_name: cstrike-kasm
    restart: unless-stopped
    shm_size: '512m'
    ports:
      - "6901:6901"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      VNC_PW: ${KASM_PASSWORD:-cstrike}
      LAUNCH_URL: http://host.docker.internal:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -o /dev/null -w '' https://127.0.0.1:6901 || [ $? -eq 22 ]"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── OWASP ZAP Daemon ──────────────────────────────────────
  # Web application security scanner — runs as a daemon with REST API on :8090
  # The API container calls ZAP's API for spider + active scan + alerts
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: cstrike-zap
    network_mode: host
    restart: unless-stopped
    user: zap
    command: >
      zap.sh -daemon -port 8090 -host 0.0.0.0
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
      -config scanner.threadPerHost=4
      -config connection.timeoutInSecs=60
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/JSON/core/view/version/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Metasploit Framework ─────────────────────────────────
  # RPC daemon for programmatic exploit/auxiliary module execution
  # The API container calls MSF's JSON-RPC API on :55553
  metasploit:
    build:
      context: .
      dockerfile: docker/Dockerfile.msf
    container_name: cstrike-msf
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_RAW
    environment:
      MSF_PASSWORD: ${MSF_PASSWORD:-msf}
    volumes:
      - msfdata:/root/.msf4
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:55553/api/v1/health 2>/dev/null || msfconsole -v >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── VulnBox Target ─────────────────────────────────────────
  # Deliberately vulnerable target host with its own IP address.
  # Services on standard ports: SSH:22, HTTP:80, FTP:21, MySQL:3306,
  # SNMP:161, SMB:445, Flask:9090, Redis:6379
  #
  # New attack surfaces (v2):
  #   - Redis 6379: no auth, planted session tokens + credentials
  #   - /.git/: exposed git repo with secrets in commit history
  #   - /api/v1/fetch: SSRF endpoint
  #   - /api/v1/jwt/*: JWT with weak secret + alg:none bypass
  #   - /import.php: XXE (libxml external entities enabled)
  #   - /cgi-bin/status.cgi: Shellshock (CVE-2014-6271)
  #   - /latest/meta-data/: Fake AWS IMDS with fake credentials
  #   - /export/: NFS no_root_squash exports
  #   - /opt/scripts: Wildcard cron injection (tar *)
  #   - /api/v1/render: SSTI (Jinja2 render_template_string)
  vulnbox:
    build:
      context: docker/vulnbox
      dockerfile: Dockerfile
    image: cstrike-vulnbox:latest
    container_name: cstrike-vulnbox
    cap_add:
      - NET_BIND_SERVICE
    networks:
      vulnnet:
        ipv4_address: 10.10.10.100
    ports:
      - "16379:6379"    # Redis (no auth) — mapped to 16379 on host to avoid conflict
    restart: unless-stopped
    volumes:
      - vulnbox-data:/var/lib/mysql

# ── Target Network ─────────────────────────────────────────
# Isolated bridge network for attack targets.
# API (network_mode: host) reaches this subnet via Docker bridge routing.
networks:
  vulnnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24
          gateway: 10.10.10.1

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  apidata:
    driver: local
  vulnbox-data:
    driver: local
  msfdata:
    driver: local
